name: Extract JAR and Generate Flow Documentation
 
on:
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
 
      - name: Extract JAR
        run: |
          mkdir -p extracted
          unzip -o hellomule.jar -d extracted/
 
      - name: List XML Files
        run: |
          echo "Found XML files:"
          find extracted -name "*.xml" | sort
 
      - name: Install Python dependencies
        run: pip install python-docx
 
      - name: Generate Word Documentation
        run: |
          python3 << 'EOF'
          from docx import Document
          from docx.shared import Pt, RGBColor
          from docx.enum.text import WD_ALIGN_PARAGRAPH
          import xml.etree.ElementTree as ET
          import os
 
          NS = {
              'mule': 'http://www.mulesoft.org/schema/mule/core',
              'http': 'http://www.mulesoft.org/schema/mule/http',
              'db':   'http://www.mulesoft.org/schema/mule/db',
              'ee':   'http://www.mulesoft.org/schema/mule/ee/core',
              'os':   'http://www.mulesoft.org/schema/mule/os',
              'file': 'http://www.mulesoft.org/schema/mule/file',
          }
 
          def get_tag(el):
              return el.tag.split('}')[-1] if '}' in el.tag else el.tag
 
          def get_ns(el):
              return el.tag.split('}')[0].strip('{') if '}' in el.tag else ''
 
          def ns_prefix(el):
              ns_map = {v: k for k, v in NS.items()}
              ns = get_ns(el)
              return ns_map.get(ns, 'mule')
 
          def add_key_value(doc, key, value):
              p = doc.add_paragraph()
              run_key = p.add_run(f"{key}: ")
              run_key.bold = True
              p.add_run(str(value) if value else "N/A")
 
          def add_section_heading(doc, title, level=2):
              doc.add_heading(title, level=level)
 
          def parse_flow(doc, flow_el, filename):
              flow_name = flow_el.attrib.get('name', 'Unnamed Flow')
              flow_type = get_tag(flow_el)
 
              doc.add_heading(f"Flow: {flow_name}", level=1)
              add_key_value(doc, "Source File", filename)
              add_key_value(doc, "Flow Type", flow_type)
 
              children = list(flow_el)
              if not children:
                  doc.add_paragraph("No components found in this flow.")
                  return
 
              # Trigger
              trigger = children[0]
              add_section_heading(doc, "Trigger")
              tag = get_tag(trigger)
              prefix = ns_prefix(trigger)
              add_key_value(doc, "Type", f"{prefix}:{tag}")
              for attr in ['path', 'method', 'allowedMethods', 'config-ref',
                           'frequency', 'timeUnit', 'directory', 'watermarkMode']:
                  val = trigger.attrib.get(attr)
                  if val:
                      add_key_value(doc, attr.capitalize(), val)
              for strategy in trigger.iter():
                  if 'fixed-frequency' in get_tag(strategy):
                      add_key_value(doc, "Schedule",
                          f"Every {strategy.attrib.get('frequency')} {strategy.attrib.get('timeUnit', 'MILLISECONDS')}")
 
              # Logic Steps
              add_section_heading(doc, "Logic Steps")
              table = doc.add_table(rows=1, cols=3)
              table.style = 'Table Grid'
              hdr = table.rows[0].cells
              hdr[0].text = 'Step'
              hdr[1].text = 'Component'
              hdr[2].text = 'Details'
              for hdr_cell in hdr:
                  for para in hdr_cell.paragraphs:
                      for run in para.runs:
                          run.bold = True
 
              for i, child in enumerate(children, 1):
                  tag = get_tag(child)
                  prefix = ns_prefix(child)
                  component = f"{prefix}:{tag}"
                  details_parts = []
                  for attr in ['path', 'method', 'config-ref', 'url',
                               'variableName', 'value', 'level', 'message',
                               'key', 'target', 'watermarkMode', 'directory']:
                      v = child.attrib.get(attr)
                      if v:
                          details_parts.append(f"{attr}={v}")
                  details = ", ".join(details_parts) if details_parts else "-"
                  row = table.add_row().cells
                  row[0].text = str(i)
                  row[1].text = component
                  row[2].text = details
 
              # DataWeave Transformations
              dw_blocks = []
              for el in flow_el.iter('{http://www.mulesoft.org/schema/mule/ee/core}set-payload'):
                  if el.text:
                      dw_blocks.append(('Transform Message', el.text.strip()))
              for el in flow_el.iter():
                  if get_tag(el) == 'set-payload' and el.text and el.text.strip():
                      dw_blocks.append(('Set Payload', el.text.strip()))
 
              if dw_blocks:
                  add_section_heading(doc, "DataWeave Transformations")
                  for idx, (purpose, script) in enumerate(dw_blocks, 1):
                      p = doc.add_paragraph()
                      run = p.add_run(f"Transform {idx} — {purpose}")
                      run.bold = True
                      code_para = doc.add_paragraph(script)
                      code_para.style = 'No Spacing'
                      for r in code_para.runs:
                          r.font.name = 'Courier New'
                          r.font.size = Pt(9)
 
              # Error Handling
              for el in flow_el.iter():
                  if get_tag(el) == 'error-handler':
                      add_section_heading(doc, "Error Handling")
                      for handler in el:
                          strategy = get_tag(handler)
                          add_key_value(doc, "Strategy", strategy)
                          add_key_value(doc, "Error Types", handler.attrib.get('type', 'ANY'))
                          add_key_value(doc, "Notifications",
                              handler.attrib.get('enableNotifications', 'true'))
 
              # Connectors Summary
              add_section_heading(doc, "Connectors Used")
              seen = set()
              for el in flow_el.iter():
                  prefix = ns_prefix(el)
                  tag = get_tag(el)
                  key = f"{prefix}:{tag}"
                  if prefix in ('http', 'db', 'os', 'file', 'salesforce') and key not in seen:
                      seen.add(key)
                      config = el.attrib.get('config-ref', '-')
                      add_key_value(doc, key, f"config-ref={config}")
 
              doc.add_paragraph("─" * 60)
 
          # ── Main ─────────────────────────────────────────────────────
          doc = Document()
 
          # Cover Page
          title = doc.add_heading('MuleSoft Flow Documentation', 0)
          title.alignment = WD_ALIGN_PARAGRAPH.CENTER
          sub = doc.add_paragraph("Auto-generated from extracted JAR contents")
          sub.alignment = WD_ALIGN_PARAGRAPH.CENTER
          doc.add_page_break()
 
          # Table of Contents placeholder
          doc.add_heading('Table of Contents', level=1)
          doc.add_paragraph("Scroll down to view all flows documented below.")
          doc.add_page_break()
 
          # Find XML files — search inside the MuleSoft source folder
          search_paths = [
              'extracted/META-INF/mule-src',   # source XML inside JAR
              'extracted',                       # root level fallback
          ]
 
          xml_files = []
          for search_root in search_paths:
              if os.path.exists(search_root):
                  for root, dirs, files in os.walk(search_root):
                      # Skip cache and settings folders
                      dirs[:] = [d for d in dirs if d not in
                                  ['.mule', '.settings', 'cache', 'offheap-disk-store',
                                   'test', 'munit', 'java']]
                      for f in files:
                          if f.endswith('.xml'):
                              full_path = os.path.join(root, f)
                              if full_path not in xml_files:
                                  xml_files.append(full_path)
 
          print(f"Processing {len(xml_files)} XML file(s):")
          for xf in xml_files:
              print(f"  {xf}")
 
          if not xml_files:
              doc.add_paragraph("No XML files found in extracted contents.")
          else:
              for xml_path in xml_files:
                  try:
                      tree = ET.parse(xml_path)
                      root_el = tree.getroot()
                      flows = (
                          root_el.findall('{http://www.mulesoft.org/schema/mule/core}flow') +
                          root_el.findall('{http://www.mulesoft.org/schema/mule/core}sub-flow')
                      )
                      if flows:
                          doc.add_heading(f"File: {os.path.basename(xml_path)}", level=1)
                          for flow in flows:
                              parse_flow(doc, flow, os.path.basename(xml_path))
                              doc.add_page_break()
                      else:
                          print(f"  No flows found in {xml_path} — skipping")
                  except ET.ParseError as e:
                      print(f"  Could not parse {xml_path}: {e}")
 
          doc.save('MuleSoft-Flow-Documentation.docx')
          print("Word document generated successfully!")
          EOF
 
      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add extracted/ MuleSoft-Flow-Documentation.docx
          git commit -m "docs: generated human-readable MuleSoft flow documentation"
          git push
